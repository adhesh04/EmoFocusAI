<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attention AI | Intervention</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #090c10;
    --surface: #0d1117;
    --surface-2: #161b22;
    --border: rgba(255,255,255,0.06);
    --border-hover: rgba(255,255,255,0.12);
    --accent: #00d4aa;
    --accent-dim: rgba(0,212,170,0.08);
    --accent-glow: rgba(0,212,170,0.2);
    --text-primary: #e6edf3;
    --text-secondary: #7d8590;
    --text-muted: #484f58;
    --red: #ff4757;
    --amber: #ffa502;
    --blue: #4a9eff;
    --purple: #a855f7;
    --pink: #ec4899;
    --sidebar-w: 260px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text-primary);
    height: 100vh; display: flex; overflow: hidden;
}
body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
}
/* SIDEBAR */
.sidebar { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-brand { padding: 28px 24px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.brand-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; overflow: hidden; }
.brand-icon::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.3) 0%, transparent 60%); }
.brand-icon svg { width: 16px; height: 16px; color: #000; position: relative; z-index: 1; }
.brand-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
.brand-tag { font-size: 10px; font-weight: 500; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(0,212,170,0.15); padding: 1px 6px; border-radius: 4px; letter-spacing: 0.5px; text-transform: uppercase; margin-left: auto; }
.nav-section { padding: 20px 12px 8px; }
.nav-label { font-size: 10px; font-weight: 500; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; padding: 0 10px; margin-bottom: 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 7px; font-size: 13.5px; font-weight: 450; color: var(--text-secondary); cursor: pointer; transition: all 0.15s ease; margin-bottom: 2px; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.nav-item:hover { background: var(--surface-2); color: var(--text-primary); }
.nav-item.active { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,212,170,0.12); }
.nav-item.active svg { color: var(--accent); }
.nav-badge { margin-left: auto; font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500; color: var(--accent); background: var(--accent-dim); padding: 1px 6px; border-radius: 10px; }
.sidebar-footer { margin-top: auto; padding: 16px 12px; border-top: 1px solid var(--border); }
.user-card { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s; }
.user-card:hover { background: var(--surface-2); }
.user-avatar { width: 30px; height: 30px; border-radius: 50%; background: linear-gradient(135deg, #667eea, #764ba2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: white; flex-shrink: 0; }
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
.user-role { font-size: 11px; color: var(--text-muted); }
.user-actions { color: var(--text-muted); }
.user-actions svg { width: 14px; height: 14px; }
/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
/* TOPBAR */
.topbar { height: 64px; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 36px; gap: 16px; flex-shrink: 0; background: rgba(9,12,16,0.8); backdrop-filter: blur(12px); }
.breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
.breadcrumb svg { width: 12px; height: 12px; }
.breadcrumb span.current { color: var(--text-primary); font-weight: 500; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.status-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(0,212,170,0.15); padding: 5px 12px; border-radius: 20px; }
.status-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse-dot 2s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
/* CONTENT */
.content { flex: 1; overflow-y: auto; padding: 36px; display: flex; flex-direction: column; align-items: center; scrollbar-width: thin; scrollbar-color: var(--surface-2) transparent; }
/* PAGE HEADER */
.page-header { width: 100%; max-width: 780px; display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 28px; }
.page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 4px; }
.page-subtitle { font-size: 13.5px; color: var(--text-secondary); }
.back-btn { display: flex; align-items: center; gap: 7px; padding: 8px 16px; border-radius: 7px; background: var(--surface); border: 1px solid var(--border); color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
.back-btn:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--surface-2); }
.back-btn svg { width: 13px; height: 13px; }
/* GAME CARD */
.game-card { width: 100%; max-width: 780px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; animation: fadeUp 0.35s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.game-card-top { height: 3px; background: var(--accent); }
.game-header { padding: 20px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.game-title-row { display: flex; align-items: center; gap: 14px; }
.game-icon { width: 44px; height: 44px; border-radius: 11px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.game-name { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
.game-sub  { font-size: 12.5px; color: var(--text-secondary); margin-top: 2px; }
.game-stats { display: flex; gap: 10px; }
.stat-chip { display: flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--border); font-size: 12px; color: var(--text-secondary); }
.stat-chip .val { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600; color: var(--text-primary); }
.game-body { padding: 32px 28px; display: flex; flex-direction: column; align-items: center; min-height: 280px; }
.game-footer { padding: 16px 28px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.btn-primary { display: flex; align-items: center; gap: 8px; padding: 10px 22px; border-radius: 8px; background: var(--accent); color: #000; border: none; font-size: 13.5px; font-weight: 600; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.18s; position: relative; overflow: hidden; }
.btn-primary::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%); }
.btn-primary:hover { background: #00bfa0; transform: translateY(-1px); box-shadow: 0 6px 20px var(--accent-glow); }
.btn-primary span, .btn-primary svg { position: relative; z-index: 1; }
.btn-primary svg { width: 14px; height: 14px; }
.btn-ghost { display: flex; align-items: center; gap: 7px; padding: 10px 18px; border-radius: 8px; background: transparent; color: var(--text-secondary); border: 1px solid var(--border); font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
.btn-ghost:hover { background: var(--surface-2); color: var(--text-primary); border-color: var(--border-hover); }
.btn-ghost svg { width: 13px; height: 13px; }
/* STATUS */
.status-line { margin-top: 14px; font-size: 13px; color: var(--text-muted); font-family: 'DM Mono', monospace; min-height: 20px; text-align: center; }
.status-line.ok   { color: var(--accent); }
.status-line.err  { color: var(--red); }
.status-line.warn { color: var(--amber); }
/* BREATHING */
.breath-wrap { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
.breath-ring { width: 170px; height: 170px; border-radius: 50%; border: 2px solid rgba(0,212,170,0.15); display: flex; align-items: center; justify-content: center; }
.breath-circle { width: 120px; height: 120px; border-radius: 50%; background: radial-gradient(circle, rgba(0,212,170,0.18), rgba(0,212,170,0.04)); border: 2px solid rgba(0,212,170,0.3); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; color: var(--accent); transition: transform 1s ease; }
.breath-circle.grow   { transform: scale(1.3); }
.breath-circle.hold   { transform: scale(1.3); }
.breath-circle.shrink { transform: scale(1.0); }
.breath-count { font-family: 'DM Mono', monospace; font-size: 30px; font-weight: 500; color: var(--accent); }
.breath-phases { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; width: 100%; max-width: 340px; }
.phase-pill { padding: 8px 10px; border-radius: 8px; text-align: center; background: var(--surface-2); border: 1px solid var(--border); font-size: 12px; font-weight: 500; color: var(--text-muted); transition: all 0.3s; }
.phase-pill .pnum { font-family: 'DM Mono', monospace; font-size: 10px; display: block; margin-bottom: 1px; }
.phase-pill.active { background: var(--accent-dim); border-color: rgba(0,212,170,0.25); color: var(--accent); }
.breath-dots { display: flex; gap: 6px; }
.bdot { width: 26px; height: 4px; border-radius: 2px; background: var(--surface-2); border: 1px solid var(--border); transition: background 0.3s; }
.bdot.done   { background: var(--accent); border-color: transparent; }
.bdot.active { background: rgba(0,212,170,0.45); }
/* PUZZLE */
.puzzle-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.puzzle-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; padding: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; }
.p-tile { width: 70px; height: 70px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 19px; font-weight: 700; font-family: 'DM Mono', monospace; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; border: 1px solid transparent; user-select: none; }
.p-tile:not(.empty):hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(0,0,0,0.35); }
.p-tile.empty { background: var(--surface-2) !important; border: 1px dashed var(--border) !important; cursor: default; }
.p-tile.win   { opacity: 0.85; }
.t1  { background:rgba(74,158,255,0.15);  border-color:rgba(74,158,255,0.3);  color:#4a9eff; }
.t2  { background:rgba(168,85,247,0.15);  border-color:rgba(168,85,247,0.3);  color:#a855f7; }
.t3  { background:rgba(236,72,153,0.15);  border-color:rgba(236,72,153,0.3);  color:#ec4899; }
.t4  { background:rgba(255,165,0,0.15);   border-color:rgba(255,165,0,0.3);   color:#ffa500; }
.t5  { background:rgba(0,212,170,0.15);   border-color:rgba(0,212,170,0.3);   color:#00d4aa; }
.t6  { background:rgba(255,71,87,0.15);   border-color:rgba(255,71,87,0.3);   color:#ff4757; }
.t7  { background:rgba(74,158,255,0.2);   border-color:rgba(74,158,255,0.35); color:#4a9eff; }
.t8  { background:rgba(168,85,247,0.2);   border-color:rgba(168,85,247,0.35); color:#a855f7; }
.t9  { background:rgba(236,72,153,0.2);   border-color:rgba(236,72,153,0.35); color:#ec4899; }
.t10 { background:rgba(255,165,0,0.2);    border-color:rgba(255,165,0,0.35);  color:#ffa500; }
.t11 { background:rgba(0,212,170,0.2);    border-color:rgba(0,212,170,0.35);  color:#00d4aa; }
.t12 { background:rgba(255,71,87,0.2);    border-color:rgba(255,71,87,0.35);  color:#ff4757; }
.t13 { background:rgba(74,158,255,0.25);  border-color:rgba(74,158,255,0.4);  color:#4a9eff; }
.t14 { background:rgba(168,85,247,0.25);  border-color:rgba(168,85,247,0.4);  color:#a855f7; }
.t15 { background:rgba(236,72,153,0.25);  border-color:rgba(236,72,153,0.4);  color:#ec4899; }
.puzzle-meta { font-size: 12.5px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
/* MEMORY */
.mem-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.mem-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; }
.m-cell { width: 86px; height: 86px; border-radius: 10px; border: 1px solid var(--border); background: #161b22; cursor: pointer; transition: all 0.12s; display: flex; align-items: center; justify-content: center; font-size: 30px; user-select: none; }
.m-cell:hover { border-color: var(--border-hover); transform: scale(1.04); }
.m-cell.wrong { background: rgba(255,71,87,0.2) !important; border-color: var(--red) !important; }
.m-cell.hit   { background: rgba(0,212,170,0.18) !important; border-color: var(--accent) !important; }
.mem-level { display: flex; align-items: center; gap: 8px; padding: 6px 14px; border-radius: 8px; background: var(--surface-2); border: 1px solid var(--border); font-size: 12.5px; color: var(--text-secondary); }
.mem-level strong { color: var(--text-primary); }
/* SUDOKU */
.sudoku-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.sudoku-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 5px; padding: 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; }
.s-cell { width: 66px; height: 66px; border-radius: 8px; border: 1px solid var(--border); background: #161b22; font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; text-align: center; color: var(--text-primary); outline: none; transition: all 0.15s; cursor: text; -moz-appearance: textfield; }
.s-cell::-webkit-inner-spin-button, .s-cell::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.s-cell:focus { border-color: rgba(0,212,170,0.4); background: rgba(0,212,170,0.06); box-shadow: 0 0 0 3px rgba(0,212,170,0.08); color: var(--accent); }
.s-cell:disabled { background: rgba(255,255,255,0.03); color: var(--text-secondary); cursor: default; border-color: rgba(255,255,255,0.05); }
.s-cell.err { border-color: rgba(255,71,87,0.45); background: rgba(255,71,87,0.07); color: var(--red); }
.s-cell.ok  { border-color: rgba(0,212,170,0.35); background: rgba(0,212,170,0.09); color: var(--accent); }
/* SIMPLE CARDS */
.simple-card { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 16px; max-width: 500px; }
.big-emoji   { font-size: 58px; line-height: 1; }
.card-question { font-size: 18px; font-weight: 500; color: var(--text-primary); line-height: 1.55; }
.card-answer { font-size: 17px; font-weight: 700; color: var(--accent); background: var(--accent-dim); border: 1px solid rgba(0,212,170,0.18); padding: 14px 22px; border-radius: 10px; width: 100%; }
.card-answer.purple { color: var(--purple); background: rgba(168,85,247,0.08); border-color: rgba(168,85,247,0.2); }
.card-answer.amber  { color: var(--amber);  background: rgba(255,165,2,0.08);  border-color: rgba(255,165,2,0.2);  }
.card-body { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
.reveal-btn { display: flex; align-items: center; gap: 8px; padding: 10px 20px; border-radius: 8px; background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.25); color: var(--purple); font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.reveal-btn:hover { background: rgba(168,85,247,0.18); }
.reveal-btn svg { width: 14px; height: 14px; }
.hidden { display: none !important; }
</style>
</head>

<div class="sidebar">
    <div class="sidebar-brand">
        <div class="brand-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">

            Dashboard
        </div>
        <div class="nav-item" onclick="goTo('monitor.html')">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><circle cx="8" cy="8" r="2.5"/><line x1="8" y1="1" x2="8" y2="3.5"/></svg>

            Analytics
        </div>
        <div class="nav-item" onclick="goTo('journal.html')">

            Journal
        </div>

        <div class="nav-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="2"/><path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.05 3.05l1.06 1.06M11.89 11.89l1.06 1.06M3.05 12.95l1.06-1.06M11.89 4.11l1.06-1.06"/></svg>

                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 8H2M5 5l-3 3 3 3M7 4V2.5A1.5 1.5 0 018.5 1h5A1.5 1.5 0 0115 2.5v11a1.5 1.5 0 01-1.5 1.5h-5A1.5 1.5 0 017 13.5V12"/></svg>
            </div>

<!-- MAIN -->
<div class="main">
    <div class="topbar">
        <div class="breadcrumb">
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="1" width="4" height="4" rx="0.8"/><rect x="7" y="1" width="4" height="4" rx="0.8"/><rect x="1" y="7" width="4" height="4" rx="0.8"/><rect x="7" y="7" width="4" height="4" rx="0.8"/></svg>
            Workspace
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4,2 8,6 4,10"/></svg>
            Focus Boosters
            <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4,2 8,6 4,10"/></svg>
            <span class="current" id="bcTitle">Activity</span>
        </div>
        <div class="topbar-right">
            <div class="status-pill">
                <div class="status-dot"></div>
                Focus Recovery
            </div>
        </div>
    </div>

    <div class="content">
        <div class="page-header">
            <div>
                <div class="page-title" id="pageTitle">Loading...</div>
                <div class="page-subtitle">Complete the activity to log your focus recovery.</div>
            </div>
            <button class="back-btn" onclick="goTo('focus_boosters.html')">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="10,2 4,8 10,14"/></svg>
                Back to Boosters

            <div class="game-card-top" id="cardTop"></div>
            <div class="game-header">
                <div class="game-title-row">
                    <div class="game-icon" id="gIcon"></div>
                    <div>
                        <div class="game-name" id="gName"></div>
                        <div class="game-sub"  id="gSub"></div>
                    </div>
                </div>
                <div class="game-stats">
                    <div class="stat-chip">Score <span class="val" id="scoreEl">0</span></div>
                    <div class="stat-chip">Time  <span class="val" id="timerEl">0:00</span></div>
                </div>
            </div>
            <div class="game-body" id="gameBody"></div>
            <div class="game-footer">
                <button class="btn-ghost" onclick="restartActivity()">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8a6 6 0 106-6H6"/><polyline points="3,4 6,8 2,8"/></svg>
                    Restart
                </button>
                <button class="btn-primary" onclick="completeIntervention()">
                    <span>I Feel Better</span>
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="3,8 7,12 13,5"/></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
// =============================================================
// GLOBALS
// =============================================================
var currentType   = null;
var timerInterval = null;
var timerSecs     = 0;
var score         = 0;
var breathTimer   = null;

function goTo(p)  { window.location.href = '/static/' + p; }
function logout() { localStorage.clear(); window.location.href = '/'; }

function startGlobalTimer() {
    clearInterval(timerInterval);
    timerSecs = 0;
    document.getElementById('timerEl').textContent = '0:00';
    timerInterval = setInterval(function() {
        timerSecs++;
        var m = Math.floor(timerSecs / 60);
        var s = timerSecs % 60;
        document.getElementById('timerEl').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }, 1000);
}

function addScore(n) {
    score += n;
    document.getElementById('scoreEl').textContent = score;
}

function setStatus(id, txt, cls) {
    var el = document.getElementById(id);
    if (!el) return;
    el.textContent = txt;
    el.className = 'status-line' + (cls ? ' ' + cls : '');
}

// =============================================================
// META
// =============================================================
var META = {
    breathing:      { icon: '&#127774;', name: 'Box Breathing',    sub: 'Follow the guide to calm your nervous system',       color: '#00d4aa', ibg: 'rgba(0,212,170,0.12)'  },
    sliding_puzzle: { icon: '&#129513;', name: 'Sliding Puzzle',   sub: 'Arrange all 15 tiles in the correct order',          color: '#a855f7', ibg: 'rgba(168,85,247,0.12)' },
    memory_game:    { icon: '&#128302;', name: 'Memory Sequence',  sub: 'Watch the pattern, then repeat it back',             color: '#ec4899', ibg: 'rgba(236,72,153,0.12)' },
    sudoku:         { icon: '&#128290;', name: 'Mini Sudoku',      sub: 'Fill every row and column with numbers 1-4',         color: '#ffa502', ibg: 'rgba(255,165,2,0.12)'  },
    brain_teaser:   { icon: '&#129504;', name: 'Brain Teaser',     sub: 'Solve the lateral thinking riddle',                  color: '#4a9eff', ibg: 'rgba(74,158,255,0.12)' },
    motivation:     { icon: '&#128293;', name: 'Motivation Boost', sub: 'A quick spark to get back into flow',                color: '#ff4757', ibg: 'rgba(255,71,87,0.12)'  },
    joke:           { icon: '&#128514;', name: 'Quick Joke',       sub: 'A moment of levity to reset your mood',              color: '#ffa502', ibg: 'rgba(255,165,2,0.12)'  }
};

// =============================================================
// BOOT
// =============================================================
window.addEventListener('load', function() {
    var type = localStorage.getItem('intervention_type') || 'breathing';
    if (!META[type]) { type = 'breathing'; }
    currentType = type;
    applyMeta(type);
    score = 0;
    document.getElementById('scoreEl').textContent = '0';
    startGlobalTimer();
    renderActivity(type);
});

function applyMeta(type) {
    var m = META[type];
    document.getElementById('pageTitle').textContent = m.name;
    document.getElementById('bcTitle').textContent   = m.name;
    document.getElementById('cardTop').style.background = m.color;
    document.getElementById('gIcon').innerHTML  = m.icon;
    document.getElementById('gIcon').style.background  = m.ibg;
    document.getElementById('gName').textContent = m.name;
    document.getElementById('gSub').textContent  = m.sub;
}

function restartActivity() {
    clearInterval(breathTimer);
    score = 0;
    document.getElementById('scoreEl').textContent = '0';
    startGlobalTimer();
    renderActivity(currentType);
}

function renderActivity(type) {
    clearInterval(breathTimer);
    var body = document.getElementById('gameBody');
    body.innerHTML = '';
    if      (type === 'breathing')      { initBreathing(body); }
    else if (type === 'sliding_puzzle') { initPuzzle(body);    }
    else if (type === 'memory_game')    { initMemory(body);    }
    else if (type === 'sudoku')         { initSudoku(body);    }
    else if (type === 'brain_teaser')   { initTeaser(body);    }
    else if (type === 'motivation')     { initMotivation(body);}
    else if (type === 'joke')           { initJoke(body);      }
}

// =============================================================
// 1. BREATHING
// =============================================================
var bRound = 0;
var ROUNDS = 5;

function initBreathing(body) {
    clearInterval(breathTimer);
    bRound = 0;
    var html = '<div class="breath-wrap">';
    html += '<div class="breath-ring"><div class="breath-circle" id="bCircle">Inhale</div></div>';
    html += '<div class="breath-count" id="bCount">4</div>';
    html += '<div class="breath-phases">';
    html += '<div class="phase-pill active" id="pp-inhale"><span class="pnum">4s</span>Inhale</div>';
    html += '<div class="phase-pill" id="pp-hold"><span class="pnum">4s</span>Hold</div>';
    html += '<div class="phase-pill" id="pp-exhale"><span class="pnum">4s</span>Exhale</div>';
    html += '</div>';
    html += '<div class="breath-dots" id="bDots"></div>';
    html += '<div class="status-line" id="bStatus">Round 1 of ' + ROUNDS + '</div>';
    html += '</div>';
    body.innerHTML = html;

    var dots = document.getElementById('bDots');
    for (var i = 0; i < ROUNDS; i++) {
        var d = document.createElement('div');
        d.className = 'bdot';
        d.id = 'bd' + i;
        dots.appendChild(d);
    }
    runBreathRound();
}

function runBreathRound() {
    if (!document.getElementById('bCircle')) { return; }
    var phases = [
        { key: 'inhale', lbl: 'Inhale', css: 'grow',   dur: 4 },
        { key: 'hold',   lbl: 'Hold',   css: 'hold',   dur: 4 },
        { key: 'exhale', lbl: 'Exhale', css: 'shrink', dur: 4 }
    ];
    var pi = 0;
    var cd = phases[0].dur;
    var dot = document.getElementById('bd' + bRound);
    if (dot) { dot.className = 'bdot active'; }
    setBreathPhase(phases[0]);
    document.getElementById('bCount').textContent = cd;
    document.getElementById('bStatus').textContent = 'Round ' + (bRound + 1) + ' of ' + ROUNDS;

    clearInterval(breathTimer);
    breathTimer = setInterval(function() {
        if (!document.getElementById('bCircle')) { clearInterval(breathTimer); return; }
        cd--;
        document.getElementById('bCount').textContent = cd;
        if (cd <= 0) {
            pi++;
            if (pi >= phases.length) {
                var d2 = document.getElementById('bd' + bRound);
                if (d2) { d2.className = 'bdot done'; }
                addScore(20);
                bRound++;
                if (bRound >= ROUNDS) {
                    clearInterval(breathTimer);
                    var st = document.getElementById('bStatus');
                    if (st) { st.textContent = 'Complete! Well done.'; st.className = 'status-line ok'; }
                    var bc = document.getElementById('bCircle');
                    if (bc) { bc.textContent = 'Done'; bc.className = 'breath-circle'; }
                    var bn = document.getElementById('bCount');
                    if (bn) { bn.textContent = ''; }
                    addScore(50);
                    return;
                }
                clearInterval(breathTimer);
                setTimeout(runBreathRound, 300);
                return;
            }
            cd = phases[pi].dur;
            setBreathPhase(phases[pi]);
            document.getElementById('bCount').textContent = cd;
        }
    }, 1000);
}

function setBreathPhase(phase) {
    var bc = document.getElementById('bCircle');
    if (bc) { bc.className = 'breath-circle ' + phase.css; bc.textContent = phase.lbl; }
    ['inhale','hold','exhale'].forEach(function(k) {
        var el = document.getElementById('pp-' + k);
        if (el) { el.className = 'phase-pill' + (k === phase.key ? ' active' : ''); }
    });
}

// =============================================================
// 2. SLIDING PUZZLE
// =============================================================
var pBoard = [];
var pEmpty = 15;
var pMoves = 0;

function initPuzzle(body) {
    pMoves = 0;
    body.innerHTML =
        '<div class="puzzle-wrap">' +
        '<div class="puzzle-grid" id="pGrid"></div>' +
        '<div class="puzzle-meta">Moves: <span id="pMoves">0</span></div>' +
        '<div class="status-line" id="pSt">Arrange tiles 1-15 in order</div>' +
        '</div>';

    pBoard = [];
    for (var i = 1; i <= 15; i++) { pBoard.push(i); }
    pBoard.push(0);
    pEmpty = 15;
    // Shuffle via valid adjacent swaps (always solvable)
    for (var s = 0; s < 300; s++) {
        var nb = pNb(pEmpty);
        var pick = nb[Math.floor(Math.random() * nb.length)];
        var tmp = pBoard[pEmpty]; pBoard[pEmpty] = pBoard[pick]; pBoard[pick] = tmp;
        pEmpty = pick;
    }
    renderPuzzle();
}

function pNb(idx) {
    var r = Math.floor(idx / 4), c = idx % 4, nb = [];
    if (r > 0) { nb.push(idx - 4); }
    if (r < 3) { nb.push(idx + 4); }
    if (c > 0) { nb.push(idx - 1); }
    if (c < 3) { nb.push(idx + 1); }
    return nb;
}

function renderPuzzle() {
    var g = document.getElementById('pGrid');
    if (!g) { return; }
    g.innerHTML = '';
    for (var i = 0; i < 16; i++) {
        (function(i) {
            var n = pBoard[i];
            var t = document.createElement('div');
            t.className = 'p-tile' + (n === 0 ? ' empty' : ' t' + n);
            t.textContent = n === 0 ? '' : n;
            t.onclick = function() { moveTile(i); };
            g.appendChild(t);
        })(i);
    }
}

function moveTile(idx) {
    var er = Math.floor(pEmpty / 4), ec = pEmpty % 4;
    var tr = Math.floor(idx / 4),    tc = idx % 4;
    var adj = (er === tr && Math.abs(ec - tc) === 1) || (ec === tc && Math.abs(er - tr) === 1);
    if (adj) {
        var tmp = pBoard[pEmpty]; pBoard[pEmpty] = pBoard[idx]; pBoard[idx] = tmp;
        pEmpty = idx;
        pMoves++;
        var mv = document.getElementById('pMoves');
        if (mv) { mv.textContent = pMoves; }
        renderPuzzle();
        checkPWin();
    }
}

function checkPWin() {
    for (var i = 0; i < 15; i++) { if (pBoard[i] !== i + 1) { return; } }
    document.querySelectorAll('.p-tile:not(.empty)').forEach(function(t) { t.classList.add('win'); });
    setStatus('pSt', 'Solved in ' + pMoves + ' moves!', 'ok');
    addScore(100 + Math.max(0, 60 - pMoves));
    setTimeout(completeIntervention, 2000);
}

// =============================================================
// 3. MEMORY GAME
// =============================================================
var mSeq = [];
var mUser = [];
var mLvl = 0;
var mLocked = false;

var CELLS = [
    { e: '&#127809;', g: 'rgba(255,71,87,0.6)',  b: 'rgba(255,71,87,0.55)'  },
    { e: '&#128149;', g: 'rgba(236,72,153,0.6)', b: 'rgba(236,72,153,0.55)' },
    { e: '&#127803;', g: 'rgba(255,165,0,0.6)',  b: 'rgba(255,165,0,0.55)'  },
    { e: '&#127850;', g: 'rgba(74,158,255,0.6)', b: 'rgba(74,158,255,0.55)' },
    { e: '&#9889;',   g: 'rgba(255,200,0,0.6)',  b: 'rgba(255,200,0,0.55)'  },
    { e: '&#127808;', g: 'rgba(0,212,170,0.6)',  b: 'rgba(0,212,170,0.55)'  },
    { e: '&#128142;', g: 'rgba(168,85,247,0.6)', b: 'rgba(168,85,247,0.55)' },
    { e: '&#127826;', g: 'rgba(255,87,51,0.6)',  b: 'rgba(255,87,51,0.55)'  },
    { e: '&#127765;', g: 'rgba(0,180,255,0.6)',  b: 'rgba(0,180,255,0.55)'  }
];

function initMemory(body) {
    mSeq = []; mUser = []; mLvl = 0; mLocked = false;
    body.innerHTML =
        '<div class="mem-wrap">' +
        '<div class="mem-level">Level <strong id="mLvlEl">1</strong> &nbsp;|&nbsp; Sequence: <strong id="mLenEl">1</strong></div>' +
        '<div class="mem-grid" id="mGrid"></div>' +
        '<div class="status-line" id="mSt">Watch carefully...</div>' +
        '</div>';

    var g = document.getElementById('mGrid');
    for (var i = 0; i < 9; i++) {
        (function(i) {
            var c = document.createElement('div');
            c.className = 'm-cell';
            c.innerHTML = CELLS[i].e;
            c.onclick = function() { memClick(i); };
            g.appendChild(c);
        })(i);
    }
    nextMemRound();
}

function nextMemRound() {
    mLvl++;
    mUser = [];
    mSeq.push(Math.floor(Math.random() * 9));
    mLocked = true;
    var le = document.getElementById('mLvlEl');
    var ln = document.getElementById('mLenEl');
    if (le) { le.textContent = mLvl; }
    if (ln) { ln.textContent = mSeq.length; }
    setStatus('mSt', 'Watch...', 'warn');
    playMemSeq();
}

function playMemSeq() {
    var i = 0;
    var iv = setInterval(function() {
        if (!document.getElementById('mGrid')) { clearInterval(iv); return; }
        var cells = document.querySelectorAll('.m-cell');
        var idx = mSeq[i];
        var cd = CELLS[idx];
        cells[idx].style.background = cd.b;
        cells[idx].style.boxShadow  = '0 0 22px ' + cd.g;
        (function(idx) {
            setTimeout(function() {
                if (cells[idx]) {
                    cells[idx].style.background = '';
                    cells[idx].style.boxShadow  = '';
                }
            }, 430);
        })(idx);
        i++;
        if (i >= mSeq.length) {
            clearInterval(iv);
            setTimeout(function() {
                mLocked = false;
                setStatus('mSt', 'Your turn!', '');
            }, 600);
        }
    }, 750);
}

function memClick(idx) {
    if (mLocked) { return; }
    mUser.push(idx);
    var pos = mUser.length - 1;
    var cells = document.querySelectorAll('.m-cell');

    if (mUser[pos] !== mSeq[pos]) {
        cells[idx].classList.add('wrong');
        setTimeout(function() { if (cells[idx]) { cells[idx].classList.remove('wrong'); } }, 500);
        setStatus('mSt', 'Wrong! Starting over...', 'err');
        mLocked = true;
        setTimeout(function() { mSeq = []; mLvl = 0; nextMemRound(); }, 1200);
        return;
    }

    cells[idx].classList.add('hit');
    setTimeout(function() { if (cells[idx]) { cells[idx].classList.remove('hit'); } }, 380);

    if (mUser.length === mSeq.length) {
        addScore(10 * mLvl);
        setStatus('mSt', 'Level ' + mLvl + ' done! +' + (10 * mLvl) + ' pts', 'ok');
        mLocked = true;
        if (mLvl >= 5) {
            setTimeout(function() {
                setStatus('mSt', 'All 5 levels complete!', 'ok');
                addScore(100);
                setTimeout(completeIntervention, 2000);
            }, 800);
        } else {
            setTimeout(nextMemRound, 1000);
        }
    }
}

// =============================================================
// 4. SUDOKU
// =============================================================
var SOL = [[1,2,3,4],[3,4,1,2],[2,1,4,3],[4,3,2,1]];
var PUZ = [[1,0,0,4],[0,4,1,0],[0,1,4,0],[4,0,0,1]];

function initSudoku(body) {
    body.innerHTML =
        '<div class="sudoku-wrap">' +
        '<div class="sudoku-grid" id="sGrid"></div>' +
        '<div class="status-line" id="sSt">Fill each row and column with 1-4</div>' +
        '</div>';

    var g = document.getElementById('sGrid');
    for (var r = 0; r < 4; r++) {
        for (var c = 0; c < 4; c++) {
            (function(r, c) {
                var cell = document.createElement('input');
                cell.type = 'number'; cell.min = 1; cell.max = 4;
                cell.className = 's-cell';
                cell.dataset.r = r; cell.dataset.c = c;
                if (PUZ[r][c] !== 0) {
                    cell.value = PUZ[r][c];
                    cell.disabled = true;
                } else {
                    cell.addEventListener('input', checkSudoku);
                    cell.addEventListener('keydown', function(e) {
                        var all = document.querySelectorAll('.s-cell');
                        if (e.key === 'ArrowRight' && c < 3) { all[r * 4 + c + 1].focus(); }
                        if (e.key === 'ArrowLeft'  && c > 0) { all[r * 4 + c - 1].focus(); }
                        if (e.key === 'ArrowDown'  && r < 3) { all[(r + 1) * 4 + c].focus(); }
                        if (e.key === 'ArrowUp'    && r > 0) { all[(r - 1) * 4 + c].focus(); }
                    });
                }
                g.appendChild(cell);
            })(r, c);
        }
    }
}

function checkSudoku() {
    var cells = document.querySelectorAll('.s-cell');
    var allOk = true;
    var allFilled = true;
    cells.forEach(function(cell) {
        if (cell.disabled) { return; }
        var r = parseInt(cell.dataset.r);
        var c = parseInt(cell.dataset.c);
        var v = parseInt(cell.value);
        if (!cell.value || cell.value === '') { allFilled = false; allOk = false; cell.className = 's-cell'; return; }
        if (v < 1 || v > 4 || v !== SOL[r][c]) { allOk = false; cell.className = 's-cell err'; }
        else { cell.className = 's-cell ok'; }
    });
    if (allOk && allFilled) {
        setStatus('sSt', 'Solved! Focus restored.', 'ok');
        addScore(150);
        setTimeout(completeIntervention, 2000);
    }
}

// =============================================================
// 5. BRAIN TEASER
// =============================================================
var TEASERS = [
    { q: 'What has keys but cannot open locks?',                         a: 'A Piano!',    e: '&#127929;' },
    { q: 'I speak without a mouth and hear without ears. What am I?',    a: 'An Echo!',    e: '&#128266;' },
    { q: 'The more you take, the more you leave behind. What am I?',     a: 'Footsteps!',  e: '&#128099;' },
    { q: 'What gets wetter the more it dries?',                          a: 'A Towel!',    e: '&#129712;' },
    { q: 'I have hands but cannot clap. What am I?',                     a: 'A Clock!',    e: '&#9200;'   }
];

function initTeaser(body) {
    var t = TEASERS[Math.floor(Math.random() * TEASERS.length)];
    body.innerHTML =
        '<div class="simple-card">' +
        '<div class="big-emoji">&#129504;</div>' +
        '<div class="card-question">' + t.q + '</div>' +

        '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 11V8M8 5h.01"/></svg>' +
        'Reveal Answer</button>' +
        '<div class="card-answer purple hidden" id="tAns">' + t.e + ' &nbsp;' + t.a + '</div>' +
        '</div>';

function revealTeaser() {
    var ans = document.getElementById('tAns');
    var btn = document.getElementById('revBtn');
    if (ans) { ans.classList.remove('hidden'); }
    if (btn) { btn.classList.add('hidden'); }
    addScore(30);
}

// =============================================================
// 6. MOTIVATION
// =============================================================
var QUOTES = [
    { e: '&#128293;', l1: 'You have already come this far.',     l2: 'Finish what you started. Future you will thank you.'                  },
    { e: '&#9889;',   l1: 'Focus is the hidden superpower.',     l2: 'A few minutes of deep work beats hours of distracted effort.'          },
    { e: '&#127919;', l1: 'One step at a time.',                 l2: 'You do not have to be great to start, but you have to start to be great.' },
    { e: '&#128640;', l1: 'Momentum is everything.',             l2: 'Keep showing up, day after day. The chain builds itself.'              }
];

function initMotivation(body) {
    var q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
    body.innerHTML =
        '<div class="simple-card">' +
        '<div class="big-emoji">' + q.e + '</div>' +
        '<div class="card-question">' + q.l1 + '</div>' +
        '<div class="card-body">' + q.l2 + '</div>' +
        '</div>';
    addScore(20);
}

// =============================================================
// 7. JOKE
// =============================================================
var JOKES = [
    { s: 'Why do programmers prefer dark mode?',   p: 'Because light attracts bugs!'         },
    { s: 'Why did the developer go broke?',         p: 'He used up all his cache!'            },
    { s: 'How do you comfort a JavaScript bug?',    p: 'You console it!'                      },
    { s: 'Why do Java developers wear glasses?',    p: 'Because they cannot C#!'              }
];

function initJoke(body) {
    var j = JOKES[Math.floor(Math.random() * JOKES.length)];
    body.innerHTML =
        '<div class="simple-card">' +
        '<div class="big-emoji">&#128514;</div>' +
        '<div class="card-question">' + j.s + '</div>' +
        '<div class="card-answer amber">' + j.p + '</div>' +
        '</div>';
    addScore(15);
}

// =============================================================
// COMPLETE
// =============================================================
async function completeIntervention() {
    clearInterval(timerInterval);
    clearInterval(breathTimer);

    var token    = localStorage.getItem('access_token');
    var sessId   = 2;
    var lastFocus = parseFloat(localStorage.getItem('last_focus_score'));

    if (lastFocus && token) {
        try {
            await fetch('http://127.0.0.1:8000/focus/log', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: sessId, focus_score: lastFocus })
            });
        } catch (e) {}
    }

    window.location.href = '/static/monitor.html';
}
